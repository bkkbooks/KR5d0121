body:
  text: 内丹還元訣長生指要篇内丹還元訣夫修道者先明五行次曉四象辯隂陽顛倒之術識七寳運用之法九仙眞炁須憑臟腑之中八卦内屬要知出處之因彼中細瑣一一具陳鉛汞黄芽列篇於後夫五行者肝肺心腎脾肝屬東方甲乙木肝者是木藏肝中有炁名曰青龍其炁從後夾脊腠道左邊脉路上來流入眼中化淚淚名眞水肝之餘炁流入上齶左邊流者名曰金液肺屬西方庚辛金肺者是金藏肺中有炁名曰白虎其炁從後夾脊腠道右邊脉路上來流入鼻中化涕涕名眞金肺之餘炁流入上齶右邊流者名曰還丹内丹經說云上有金液還丹是也心屬南方丙丁火心者是火藏心中有炁名曰朱雀其炁屬前三道寳階從前中心脉路上來入舌下化津却咽入心心中化穴一名眞火血餘炁流入上齶右邊流者名曰神水腎屬北方壬癸水腎名水藏腎中有炁名曰玄武其炁從肚右邊脉路上來入耳巡還天界却下入於腎腎中餘炁流入舌下右邊流者名曰華池内丹經說云中有神水華池是也脾屬中央戊己土脾者是土藏脾中有炁名曰螣蛇其炁從後夾脊腠道上來入於肺肺中化涎名眞土涎之餘炁流入脣内名曰黄芽夫四象者一金翁二姹女三嬰兒四黄婆一金翁者肺中之唾問曰唾屬隂因何名金翁答曰爲上有還丹金液神水華池黄芽和合爲陽爲上陽下隂故名金翁即知天上有日日是純陽日中有烏烏有三足屬西方庚辛金内隂外陽即名金翁二姹女者是心中之穴問曰穴屬南方丙丁火屬陽中穴亦屬陽何名姹女答曰爲上唾屬隂下血屬陽爲隂中有陽故名姹女即知天上有月月是純隂月中有兔兔屬東方甲乙木爲上陽下隂即名姹女三嬰兒者是腎中之精問曰腎中之精純隂内名嬰兒只如男子身純陽内中有精屬隂爲陽中有隂即名嬰兒故曰坎男離女四黄婆者是脾中之涎涎者名眞土問曰土脾屬隂涎亦屬隂因何無隂陽匹配答曰脾爲上隂涎爲下隂是爲孤隂故名黄婆内七寳者津水唾血神炁精九仙眞炁出在人身鼻中入者炁屬肝出者炁屬肺口中吹者炁屬腎呵者炁屬心嘻者炁屬脾家長出用炁屬小腸炁見人先怒者屬膀胱炁見人喜者屬三焦家炁穀炁者通下泄之炁肝卦震爲雷膽卦巽爲風心卦离爲火小腸卦坤爲地肺卦兌爲澤大腸卦乾爲天腎卦坎爲水膀胱卦艮爲山内丹還元訣
