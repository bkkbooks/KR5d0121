body:
  text: 內丹還元訣長生指要篇內丹還元訣夫修道者先明五行次曉四象辨隂陽顛倒之術識七寶運用之法九仙真氣須憑臟腑之中八卦內屬要知出處之因彼中細瑣一一具陳鉛汞黃芽列篇於後夫五行者肝肺心腎脾肝屬東方甲乙木肝者是木藏肝中有氣名曰青龍其氣從後夾脊腠道左邊脈路上來流入眼中化淚淚名真水肝之餘氣流入上齶左邊流者名曰金液肺屬西方庚辛金肺者是金藏肺中有氣名曰白虎其氣從後夾脊腠道右邊脈路上來流入鼻中化涕涕名真金肺之餘氣流入上齶右邊流者名曰還丹內丹經説云上有金液還丹是也心屬南方丙丁火心者是火藏心中有氣名曰朱雀其氣屬前三道寶階從前中心脈路上來入舌下化津却咽入心心中化穴一名真火血餘氣流入上齶右邊流者名曰神水腎屬北方壬癸水腎名水藏腎中有氣名曰玄武其氣從肚右邊脈路上來入耳巡還天界却下入於腎腎中餘氣流入舌下右邊流者名曰華池內丹經説云中有神水華池是也脾屬中央戊己土脾者是土藏脾中有氣名曰螣蛇其氣從後夾脊腠道上來入於肺肺中化涎名真土涎之餘氣流入脣內名曰黃芽夫四象者一金翁二姹女三嬰兒四黃婆一金翁者肺中之唾問曰唾屬隂因何名金翁答曰為上有還丹金液神水華池黃芽和合為陽為上陽下隂故名金翁即知天上有日日是純陽日中有烏烏有三足屬西方庚辛金內隂外陽即名金翁二姹女者是心中之穴問曰穴屬南方丙丁火屬陽中穴亦屬陽何名姹女答曰為上唾屬隂下血屬陽為隂中有陽故名姹女即知天上有月月是純隂月中有兔兔屬東方甲乙木為上陽下隂即名姹女三嬰兒者是腎中之精問曰腎中之精純隂內名嬰兒只如男子身純陽內中有精屬隂為陽中有隂即名嬰兒故曰坎男離女四黃婆者是脾中之涎涎者名真土問曰土脾屬隂涎亦屬隂因何無隂陽匹配答曰脾為上隂涎為下隂是為孤隂故名黃婆內七寶者津水唾血神氣精九仙真氣出在人身鼻中入者氣屬肝出者氣屬肺口中吹者氣屬腎呵者氣屬心嘻者氣屬脾家長出用氣屬小腸氣見人先怒者屬膀胱氣見人喜者屬三焦家氣穀氣者通下泄之氣肝卦震為雷膽卦巽為風心卦離為火小腸卦坤為地肺卦兌為澤大腸卦乾為天腎卦坎為水膀胱卦艮為山內丹還元訣
